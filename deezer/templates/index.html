<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emsam Crate · Buscador de música</title>
  <style>
    :root{
      --bg:#0b0e14;
      --panel:#141922;
      --panel-2:#1b2230;
      --line:#2a3342;
      --ink:#e8edf4;
      --muted:#7d8aa0;
      --accent:#00e0a4;      /* verde-espectro */
      --accent-2:#ff5c8a;    /* rosa-señal */
      --amber:#ffb347;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Segoe UI',system-ui,sans-serif;
      background:
        radial-gradient(900px 400px at 80% -10%, rgba(0,224,164,.08), transparent),
        var(--bg);
      color:var(--ink);
      min-height:100vh;
      padding:32px 20px 60px;
    }
    .wrap{max-width:1080px;margin:0 auto}

    header{margin-bottom:28px}
    .eyebrow{
      font-size:12px;letter-spacing:3px;text-transform:uppercase;
      color:var(--accent);font-weight:700;
    }
    h1{
      font-size:clamp(28px,5vw,44px);font-weight:800;letter-spacing:-1px;
      margin:6px 0 4px;line-height:1;
    }
    h1 span{color:var(--muted);font-weight:400}
    .sub{color:var(--muted);font-size:14px}

    /* barra de ecualizador decorativa */
    .eq{display:flex;gap:3px;align-items:flex-end;height:26px;margin-top:14px}
    .eq i{width:4px;background:var(--accent);border-radius:2px;
      animation:bounce 1.1s ease-in-out infinite}
    .eq i:nth-child(2){background:var(--accent-2);animation-delay:.1s}
    .eq i:nth-child(3){background:var(--amber);animation-delay:.2s}
    .eq i:nth-child(4){background:var(--accent);animation-delay:.3s}
    .eq i:nth-child(5){background:var(--accent-2);animation-delay:.15s}
    .eq i:nth-child(6){background:var(--amber);animation-delay:.25s}
    .eq i:nth-child(7){background:var(--accent);animation-delay:.05s}
    @keyframes bounce{0%,100%{height:6px}50%{height:26px}}
    @media (prefers-reduced-motion:reduce){.eq i{animation:none;height:16px}}

    /* consola de búsqueda */
    .console{
      background:linear-gradient(180deg,var(--panel),var(--panel-2));
      border:1px solid var(--line);border-radius:16px;
      padding:20px;margin:24px 0 28px;
      box-shadow:0 20px 50px rgba(0,0,0,.4);
    }
    .row{display:flex;gap:10px;flex-wrap:wrap}
    input[type=text]{
      flex:1;min-width:220px;
      background:#0c1017;border:1px solid var(--line);
      color:var(--ink);font-size:15px;padding:14px 16px;border-radius:10px;
      outline:none;transition:border-color .15s;
    }
    input[type=text]:focus{border-color:var(--accent)}
    .toggle{display:flex;background:#0c1017;border:1px solid var(--line);
      border-radius:10px;overflow:hidden}
    .toggle button{
      background:none;border:none;color:var(--muted);
      padding:0 18px;font-size:13px;font-weight:600;cursor:pointer;
      letter-spacing:.5px;
    }
    .toggle button.on{background:var(--accent);color:#04120d}
    .go{
      background:var(--accent);color:#04120d;border:none;
      padding:0 26px;border-radius:10px;font-size:15px;font-weight:700;
      cursor:pointer;transition:transform .1s;
    }
    .go:hover{transform:translateY(-1px)}
    .go:active{transform:translateY(0)}

    .status{color:var(--muted);font-size:13px;min-height:18px;margin-bottom:14px}
    .status b{color:var(--ink)}

    /* rejilla de resultados */
    .grid{display:grid;gap:14px;
      grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
    .card{
      background:var(--panel);border:1px solid var(--line);
      border-radius:12px;overflow:hidden;display:flex;flex-direction:column;
      transition:border-color .15s,transform .15s;
    }
    .card:hover{border-color:var(--accent);transform:translateY(-2px)}
    .card .cover{width:100%;aspect-ratio:1;object-fit:cover;background:#0c1017}
    .card .body{padding:12px 14px}
    .card .t{font-weight:700;font-size:14px;line-height:1.3;
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .card .a{color:var(--accent);font-size:13px;margin-top:2px}
    .card .m{color:var(--muted);font-size:12px;margin-top:6px}
    .card audio{width:100%;margin-top:10px;height:32px}

    .card.artist{align-items:center;text-align:center;padding-bottom:14px}
    .card.artist .cover{border-radius:50%;width:120px;height:120px;
      margin:16px auto 0}

    footer{margin-top:40px;color:var(--muted);font-size:12px;
      border-top:1px solid var(--line);padding-top:16px}
    footer code{color:var(--accent)}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow">Emsam Sound</div>
      <h1>Crate <span>· buscador de música</span></h1>
      <p class="sub">Consulta el catálogo de Deezer para armar el set de tu evento.</p>
      <div class="eq"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
    </header>

    <div class="console">
      <div class="row">
        <input type="text" id="q" placeholder="Escribe un artista o una canción…"
               autocomplete="off">
        <div class="toggle">
          <button id="tCanciones" class="on" onclick="setTipo('canciones')">Canciones</button>
          <button id="tArtistas" onclick="setTipo('artistas')">Artistas</button>
        </div>
        <button class="go" onclick="buscar()">Buscar</button>
      </div>
    </div>

    <div class="status" id="status">Empieza escribiendo arriba y pulsa Buscar.</div>
    <div class="grid" id="grid"></div>

    <footer>
      Datos obtenidos de la API pública de Deezer ·
      Endpoint JSON disponible en <code>/deezer/api/buscar?q=…</code>
    </footer>
  </div>

<script>
  let tipo = 'canciones';
  const $ = id => document.getElementById(id);

  function setTipo(t){
    tipo = t;
    $('tCanciones').classList.toggle('on', t==='canciones');
    $('tArtistas').classList.toggle('on', t==='artistas');
  }

  function fmt(seg){
    if(!seg) return '--:--';
    const m = Math.floor(seg/60), s = seg%60;
    return m + ':' + String(s).padStart(2,'0');
  }

  async function buscar(){
    const q = $('q').value.trim();
    if(!q){ $('status').textContent = 'Escribe algo para buscar.'; return; }
    $('status').innerHTML = 'Buscando <b>'+q+'</b>…';
    $('grid').innerHTML = '';
    try{
      // ruta relativa: funciona bajo /deezer/ en nginx
      const r = await fetch('api/buscar?q='+encodeURIComponent(q)+'&tipo='+tipo);
      const d = await r.json();
      if(d.error){ $('status').textContent = 'Error: '+d.error; return; }
      if(d.total === 0){ $('status').textContent = 'Sin resultados para '+q+'.'; return; }
      $('status').innerHTML = '<b>'+d.total+'</b> resultados para <b>'+q+'</b>.';
      render(d.resultados, tipo);
    }catch(e){
      $('status').textContent = 'No se pudo conectar con el servicio.';
    }
  }

  function render(items, tipo){
    const grid = $('grid');
    grid.innerHTML = items.map(it => {
      if(tipo === 'artistas'){
        const fans = (it.fans||0).toLocaleString();
        return `<div class="card artist">
          <img class="cover" src="${it.foto||''}" alt="" loading="lazy">
          <div class="body">
            <div class="t">${it.nombre}</div>
            <div class="m">${fans} fans · ${it.albumes||0} álbumes</div>
          </div></div>`;
      }
      const audio = it.preview
        ? `<audio controls preload="none" src="${it.preview}"></audio>` : '';
      return `<div class="card">
        <img class="cover" src="${it.portada||''}" alt="" loading="lazy">
        <div class="body">
          <div class="t">${it.titulo}</div>
          <div class="a">${it.artista}</div>
          <div class="m">${it.album||''} · ${fmt(it.duracion)}</div>
          ${audio}
        </div></div>`;
    }).join('');
  }

  $('q').addEventListener('keydown', e => { if(e.key==='Enter') buscar(); });
</script>
</body>
</html>
