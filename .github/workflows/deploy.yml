name: CI/CD — Dashboard Deploy (systemd, Practica 4)

# Desactivado en push para no chocar con el workflow de Docker (Practica 5).
# Queda ejecutable manualmente desde la pestaña Actions si se necesita.
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Ejecutar pruebas
        run: python -m unittest test_app.py -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Configurar llave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy en el servidor
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              "${{ secrets.SERVER_USER }}"@"${{ secrets.SERVER_HOST }}" \
              '
              set -e
              cd /opt/dashboard
              git pull origin main
              ./venv/bin/pip install -r requirements.txt
              sudo systemctl restart dashboard
              echo "Deploy completado: $(date)"
              '
