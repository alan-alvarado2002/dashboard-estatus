services:

  # ── Dashboard de estatus (Práctica 4/5) ────────────────────
  flask-app:
    build: .
    container_name: dashboard-app
    restart: always
    networks:
      - red-interna

  # ── Buscador de música Deezer ──────────────────────────────
  deezer-app:
    build: ./deezer
    container_name: deezer-app
    restart: always
    networks:
      - red-interna

  # ── nginx: proxy inverso para ambos servicios ──────────────
  nginx:
    image: nginx:alpine
    container_name: dashboard-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - flask-app
      - deezer-app
    networks:
      - red-interna

networks:
  red-interna:
    driver: bridge
