server {
    listen 80;
    server_name _;

    # ── Dashboard de estatus (Práctica 4/5) ───────────────────
    location / {
        proxy_pass         http://flask-app:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # ── Buscador de música Deezer ─────────────────────────────
    # Redirige /deezer  ->  /deezer/  para que las rutas relativas funcionen
    location = /deezer {
        return 301 /deezer/;
    }

    # Quita el prefijo /deezer/ antes de pasar al contenedor.
    # La barra final en proxy_pass hace que Flask reciba "/" y "/api/buscar".
    location /deezer/ {
        proxy_pass         http://deezer-app:5000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
}
